<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignacion</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- Navbar -->
<div id="navbar"></div>

<div class="d-flex">

    <!-- Sidebar -->
    <div id="sidebar"></div>

 <div class="content">
    <h3>Asignación Directa de Bienes</h3>
    <div class="card p-4">
        <div class="row g-3">
            <div class="col-md-5">
                <label>Seleccionar Bien (Sin asignar o para reasignar)</label>
                <select id="select_bien" class="form-select">
                    <option value="">-- Seleccione Bien --</option>
                </select>
            </div>
            <div class="col-md-5">
                <label>Asignar a Persona</label>
                <select id="select_persona" class="form-select">
                    <option value="">-- Seleccione Colaborador --</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button id="btn_asignar" class="btn btn-success w-100">Confirmar Asignación</button>
            </div>
        </div>
    </div>
</div>
<!-- Scripts -->
<script src="../js/layout.js"></script>
<script>
    cargarComponente("navbar", "navbar.html");
    cargarComponente("sidebar", "sidebar.html");
</script>

<script type="module" src="../js/asignacion.js"></script>

</body>
</html>
