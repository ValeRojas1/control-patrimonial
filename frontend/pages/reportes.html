<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desplazamientos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- Navbar -->
<div id="navbar"></div>

<div class="d-flex">

    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Contenido -->
    <div class="content">
        <div class="container mt-4">
    <h2>Módulo de Reportes Patrimoniales</h2>
    
    <div class="row">
        <div class="col-md-6">
            <div class="card shadow mb-4">
                <div class="card-header bg-primary text-white">Acta de Asignación Actual</div>
                <div class="card-body">
                    <p>Genera un documento con los bienes que una persona tiene bajo su responsabilidad actualmente.</p>
                    <select id="select_persona" class="form-select mb-3">
                        <option value="">Seleccione Colaborador...</option>
                    </select>
                    <button id="btn_repo_asignacion" class="btn btn-outline-primary w-100">
                        <i class="bi bi-file-pdf"></i> Descargar Acta
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow mb-4">
                <div class="card-header bg-dark text-white">Historial de Movimientos</div>
                <div class="card-body">
                    <p>Descarga el historial completo de desplazamientos realizados entre áreas y personas.</p>
                    <br>
                    <button id="btn_repo_historial" class="btn btn-outline-dark w-100">
                        <i class="bi bi-clock-history"></i> Generar Historial General
                    </button>
                </div>
            </div>
        </div>
        </div>
    </div>
    </div>

<!-- Scripts -->
<script src="../js/layout.js"></script>
<script>
    cargarComponente("navbar", "navbar.html");
    cargarComponente("sidebar", "sidebar.html");
</script>

<script type="module" src="../js/desplazamientos.js"></script>

</body>
</html>
