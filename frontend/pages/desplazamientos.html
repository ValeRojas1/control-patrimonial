<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desplazamientos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- Navbar -->
<div id="navbar"></div>

<div class="d-flex">

    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Contenido -->
    <div class="content">

        <h3>Desplazamiento de Bienes</h3>

       <div class="card p-4">
        <div class="row g-3">
            <div class="col-md-6">
                <input id="nro_desplazamiento" class="form-control" placeholder="N° Desplazamiento">
            </div>

            <div class="col-md-6">
                <input id="fecha_desplazamiento" type="date" class="form-control">
            </div>

            <div class="col-md-6">
                <select id="select_origen" class="form-select">
                    <option value="">Seleccione Persona Origen</option>
                </select>
            </div>

            <div class="col-md-6">
                <select id="select_destino" class="form-select">
                    <option value="">Seleccione Persona Destino</option>
                </select>
            </div>

            <div class="col-12">
                <h6>Seleccione los bienes a transferir:</h6>
                <div id="lista_bienes_origen" class="border p-3 bg-light" style="max-height: 200px; overflow-y: auto;">
                    <p class="text-muted italic">Seleccione primero una persona de origen...</p>
                </div>
            </div>

            <div class="col-12">
                <textarea id="txt_motivo" class="form-control" placeholder="Motivo (ej: renuncia, cambio de área)"></textarea>
            </div>

            <div class="col-12 text-end">
                <button id="btn_transferir" class="btn btn-warning">Transferir</button>
            </div>
        </div>
    </div>

    </div>
</div>

<!-- Scripts -->
<script src="../js/layout.js"></script>
<script>
    cargarComponente("navbar", "navbar.html");
    cargarComponente("sidebar", "sidebar.html");
</script>

<script type="module" src="../js/desplazamientos.js"></script>

</body>
</html>
