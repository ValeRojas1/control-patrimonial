<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desplazamientos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- Navbar -->
<div id="navbar"></div>

<div class="d-flex">

    <!-- Sidebar -->
    <div id="sidebar"></div>

    <!-- Contenido -->
    <div class="content">

        <h3>Desplazamiento de Bienes</h3>

        <div class="card p-4">
            <div class="row g-3">

                <div class="col-md-6">
                    <input class="form-control" placeholder="N° Desplazamiento">
                </div>

                <div class="col-md-6">
                    <input type="date" class="form-control">
                </div>

                <div class="col-md-6">
                    <select class="form-control">
                        <option>Persona origen</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <select class="form-control">
                        <option>Persona destino</option>
                    </select>
                </div>

                <div class="col-12">
                    <textarea class="form-control" placeholder="Motivo"></textarea>
                </div>

                <div class="col-12 text-end">
                    <button class="btn btn-warning">Transferir</button>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- Scripts -->
<script src="../js/layout.js"></script>
<script>
    cargarComponente("navbar", "navbar.html");
    cargarComponente("sidebar", "sidebar.html");
</script>

<script type="module" src="../js/desplazamientos.js"></script>

</body>
</html>
